name: 🐛 Проблема
title: '[Проблема] '
description: Сообщить о проблеме
labels: ['type: проблема', 'status: нуждается в сортировке']

body:
  - type: checkboxes
    id: checklist
    attributes:
      label: ⚠️ Чеклист
      description: Перед созданием нового Issue, удостоверьтесь что выполнили следующие пункты
    options:
      - label: Я искал решение проблемы в [README](https://github.com/poise52/zapret2-discord-youtube/blob/main/README.md) и среди [Issues](https://github.com/poise52/zapret2-discord-youtube/issues)
      - label: Я скачал ``zapret2-discord-youtube`` из [релизов официального репозитория](https://github.com/poise52/zapret2-discord-youtube/releases)

  - type: textarea
    id: description
    attributes:
      label: Опишите вашу проблему
      description: Чётко опишите проблему с которой вы столкнулись
      placeholder: Описание проблемы
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Версия zapret2-discord-youtube
      description: Версия zapret2-discord-youtube на которой вы словили проблему
      placeholder: Версия
    validations:
      required: true

  - type: textarea
    id: additions
    attributes:
      label: Дополнительные детали
      description: Дополнительные детали о которых нам нужно знать
