name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP Archive
        run: |
          TAG_NAME="${{ github.ref_name }}"
          ARCHIVE_NAME="zapret2-discord-youtube-${TAG_NAME}.zip"
          
          # Упаковываем только нужные файлы и папки для запуска
          zip -r "${ARCHIVE_NAME}" bin/ exe/ lists/ lua/ presets/ utils/ windivert.filter/ *.bat README.md LICENSE
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            zapret2-discord-youtube-${{ github.ref_name }}.zip
