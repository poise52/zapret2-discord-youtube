name: Auto comment on new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on new issue
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            # Пожалуйста, ознакомьтесь с README. В нем есть ответы на распространенные вопросы и описания файлов: [README.md](https://github.com/poise52/zapret2-discord-youtube/blob/main/README.md)

            ### Прежде всего
            - Запустите `service.bat` от имени администратора и выберите пункт `8` (Диагностика), чтобы проверить систему на конфликтующие службы (GoodbyeDPI, старый zapret1 и др.).
            - Если у вас проблемы с запуском Discord, то в меню `service.bat` выберите пункт `10` (Очистить кэш Discord).
            - Убедитесь, что включены TCP timestamps (пункт `11` в `service.bat`).
            - Если текущая стратегия (пресет) не работает, попробуйте другие пресеты из папки `presets/` с помощью пункта `1` (Выбрать пресет).

            ##
            ### Проблемы с файлами? (не запускается / ошибки драйверов)
            - Запустите `service.bat` -> выберите `6` (Остановить процесс) -> затем `3` (Удалить автозапуск).
            - Убедитесь, что процесс `winws2.exe` завершен и не запущен в диспетчере задач.
            - Перезагрузите компьютер.
            - Скачайте последнюю версию [со страницы релизов](https://github.com/poise52/zapret2-discord-youtube/releases).
            - Распакуйте сборку в новую папку в корне диска (желательно без пробелов, кириллицы и спецсимволов, например `C:\zapret2`).
            - Откройте `service.bat` -> запустите пункт `9` (Тестирование пресетов). Скрипт проверит вашу сеть на всех 22 стратегиях и покажет, какая из них работает лучше всего.
            - После выбора рабочей стратегии установите её на скрытый автозапуск через пункт `2` (Установить автозапуск).
